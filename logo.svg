<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient (slate-900 -> blue-950 -> slate-950) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#172554" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Google Font inclusion using style inside SVG is not perfectly supported in all viewers, but commonly works. 
         We'll use a standard serif fallback just in case. -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,700&amp;display=swap');
      
      .fluency {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-weight: 600;
        font-size: 64px;
        letter-spacing: 0.1em;
        fill: rgba(255, 255, 255, 0.9);
      }
      
      .bridge {
        font-family: 'Playfair Display', "Times New Roman", Times, serif;
        font-style: italic;
        font-weight: 500;
        font-size: 110px;
        fill: #ffffff;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />

  <!-- Inner border or subtle glow to look premium -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="#2563eb" stroke-opacity="0.3" stroke-width="2" />

  <!-- Texts centered -->
  <g transform="translate(256, 230)" text-anchor="middle">
    <!-- "FLUENCY" -->
    <text x="0" y="-10" class="fluency">FLUENCY</text>
    <!-- "bridge" -->
    <text x="0" y="80" class="bridge">bridge</text>
  </g>
  
  <!-- Subtle line accent -->
  <line x1="206" y1="360" x2="306" y2="360" stroke="#93c5fd" stroke-width="4" stroke-opacity="0.8" stroke-linecap="round" />
</svg>
