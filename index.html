<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluency Bridge</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gradient-to-b from-slate-900 via-blue-950 to-slate-950 text-white min-h-screen font-sans p-6">

    <div class="max-w-4xl mx-auto mt-12">

        <!-- HERO -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl tracking-wide">
                <span class="block text-white/90 font-semibold tracking-widest">
                    FLUENCY
                </span>

                <span class="block text-white mt-2 text-5xl md:text-6xl"
                      style="font-family: 'Playfair Display', serif; font-style: italic;">
                    bridge
                </span>
            </h1>

            <p class="text-sm text-blue-300 mt-4">
                Build precision. Eliminate confusion.
            </p>
        </header>

        <!-- MAIN BUTTON -->
        <div class="text-center mb-10">
            <a href="presentcontinuoustest.html"
               class="inline-block bg-blue-600 hover:bg-blue-700 transition-all 
                      text-white font-semibold px-6 py-3 rounded-xl shadow-lg 
                      hover:shadow-blue-500/30">
                Start Present Continuous Test →
            </a>
        </div>

        <!-- AUTO GENERATED TOOLS -->
        <div id="tools" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

    </div>

    <!-- SCRIPT -->
    <script>
        const repo = "amangargindia/fluencybridgeindia";

        fetch(`https://api.github.com/repos/${repo}/contents/`)
            .then(res => res.json())
            .then(files => {

                const container = document.getElementById("tools");

                files
                    .filter(file => file.name.endsWith(".html") && file.name !== "index.html")
                    .forEach(file => {

                        // Convert filename → readable title
                        let name = file.name
                            .replace(".html", "")
                            .replace(/[-_]/g, " ")
                            .replace(/([A-Z])/g, " $1")
                            .replace(/\b\w/g, l => l.toUpperCase());

                        // Special cleanup (optional refinement)
                        name = name.replace("Docxtopdf", "DOCX to PDF Exporter");

                        const card = document.createElement("a");
                        card.href = file.name;
                        card.className = `
                            block p-6 bg-slate-800/60 backdrop-blur border border-slate-700 rounded-xl 
                            hover:border-blue-500 hover:shadow-lg hover:shadow-blue-500/20 transition-all group
                        `;

                        card.innerHTML = `
                            <h2 class="text-lg font-semibold text-blue-400 mb-2 group-hover:text-blue-300">
                                ${name}
                            </h2>
                            <p class="text-sm text-slate-300">
                                Open tool →
                            </p>
                        `;

                        container.appendChild(card);
                    });
            })
            .catch(err => {
                console.error("Error loading tools:", err);
            });
    </script>

</body>
</html>
