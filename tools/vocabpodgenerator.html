<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabPod Builder - FB Internal Tools</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-inter { font-family: 'Inter', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* PDF Printing Optimization */
        .pdf-avoid-break { page-break-inside: avoid !important; break-inside: avoid !important; }
    </style>
</head>
<body class="bg-[#0B1324] text-white overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS (SVG replacements for Lucide to make it standalone) ---
        const Icon = ({ path, size = 24, className = "", spin = false }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} ${spin ? 'animate-spin' : ''}`}>
                {path}
            </svg>
        );
        const BookOpen = (p) => <Icon {...p} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />;
        const Download = (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const CloudUpload = (p) => <Icon {...p} path={<><path d="M12 12v9"/><path d="M12 12l-3 3"/><path d="M12 12l3 3"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><path d="M16 16l-4-4-4 4"/></>} />;
        const FileText = (p) => <Icon {...p} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>} />;
        const Type = (p) => <Icon {...p} path={<><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>} />;
        const ImageIcon = (p) => <Icon {...p} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />;
        const Trash2 = (p) => <Icon {...p} path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const Loader2 = (p) => <Icon {...p} spin path={<><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></>} />;
        const Info = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>} />;
        const Copy = (p) => <Icon {...p} path={<><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>} />;
        const Check = (p) => <Icon {...p} path={<polyline points="20 6 9 17 4 12"/>} />;
        const X = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const ArrowLeft = (p) => <Icon {...p} path={<><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>} />;

        // --- CONSTANTS ---
        const AI_PROMPT = `You are an expert vocabulary content creator for the "Fluency Bridge" app. 
I will give you a Target Word. You must generate content for that word strictly following the syntax rules and structure below. 

CRITICAL SYNTAX RULES:
1. You MUST use the exact main tags: <STORY>, <MEANING>, <MNEMONIC>, and <USAGE>.
2. You must give output in md codeblock format
3. You MUST use the exact sub-tags like <<English:>>, <<Hindi:>>, <<Text>>, and <<1>>. <MEANING> uses <<English:>> ; <<Hindi:>>, <MNEMONIC> uses <<Text>>, <USAGE> uses Numbering as <<1>>, <<2>> etc
4. TARGET WORD HIGHLIGHTING: Every single time the target word appears in the Story or Usage sentences, it MUST be wrapped in double asterisks (e.g., **WORD**). This triggers our app's UI highlight.
5. Do NOT add any extra conversational text, markdown formatting outside of what is requested, or tags like <Use cases>. Just output the raw structure.

--- START OF REQUIRED STRUCTURE ---

<STORY>
[Write a short 10-25 line Hindi story. The target word must be used 3-4 times in English within the Hindi text, wrapped in **asterisks**. Story should be realistic, not hyperbolic, not controversial and easy to read with realistic and lot of usage of target word. Use the word in different forms as well like as verb, adverb, noun, past tense etc - whatever formation is possible of that word. use it in varied context]

<MEANING>
<<English:>>
[English definition]
<<Hindi:>>
[Hindi definition]

<MNEMONIC>
<<Text>>
[Write the mnemonic logic/trick to remember the word. You can use *italics* with single asterisks here. Make sure Mnemonic is
- Image inducing 
- Connects words to its meaning
- Sort of absurd
- Does NOT uses acronym or anything which is not image inducing like asking to relate word to some text or sound]
- if i do not like the Mnemonic, give other suggestions till i choose one then you'll incorporate it into final text, same goes for the story.

<USAGE>
<<1>>. [Short Context Name, e.g., At the Office]
EN: [English sentence using the **target word**.]
HI: [Hindi translation using the **target word**.]

<<2>>. [Short Context Name]
EN: [English sentence using the **target word**.]
HI: [Hindi translation using the **target word**.]

<<3>>. [Short Context Name]
EN: [English sentence using the **target word**.]
HI: [Hindi translation using the **target word**.]

<<4>>. [Short Context Name]
EN: [English sentence using the **target word**.]
HI: [Hindi translation using the **target word**.]

<<5>>. [Short Context Name]
EN: [English sentence using the **target word**.]
HI: [Hindi translation using the **target word**.]

--- END OF REQUIRED STRUCTURE ---

NOT in markdown:

[Write a prompt when Mnemonic has been decided in final stage that I can use in an AI image generator to create the mnemonic image. Just raw text, no tags needed for this part. A good detailed prompt that will produce the image inducing image i want it to have]`;

        // --- CUSTOM MARKDOWN PARSER ---
        const parseMarkdown = (text) => {
          if (!text) return null;
          const lines = text.replace(/\r\n/g, '\n').split('\n');
          const elements = [];

          const parseInline = (line) => {
            const parts = line.split(/(\*\*.*?\*\*|\*.*?\*)/g);
            return parts.map((part, i) => {
              if (part.startsWith('**') && part.endsWith('**')) {
                return (
                  <strong key={i} className="text-[#60A5FA] font-bold uppercase tracking-wide">
                    {part.slice(2, -2)}
                  </strong>
                );
              }
              if (part.startsWith('*') && part.endsWith('*')) {
                return <em key={i} className="text-[#9CA3AF] italic">{part.slice(1, -1)}</em>;
              }
              return <span key={i}>{part}</span>;
            });
          };

          lines.forEach((line, index) => {
            if (line.trim() !== '') {
              elements.push(
                <p key={`p-${index}`} className="mb-2 text-[#D1D5DB] leading-relaxed text-[1rem]">
                  {parseInline(line)}
                </p>
              );
            }
          });

          return elements;
        };

        // --- STRICT RAW TEXT PARSER ---
        const parseRawContent = (rawText) => {
          const cleanText = (str) => {
            if (!str) return '';
            let cleaned = str.replace(/<Use cases>/ig, '');
            return cleaned.replace(/^[\s\r\n\-]+|[\s\r\n\-]+$/g, '');
          };

          const getSection = (tag, nextTags) => {
            const regex = new RegExp(`<${tag}>([\\s\\S]*?)(?=${nextTags.map(t => `<${t}>`).join('|')}|$)`, 'i');
            const match = rawText.match(regex);
            return match ? match[1].trim() : '';
          };

          const story = cleanText(getSection('STORY', ['MEANING', 'MNEMONIC', 'USAGE']));
          const meaningRaw = getSection('MEANING', ['MNEMONIC', 'USAGE', 'STORY']);
          
          let meaningEn = '', meaningHi = '';
          if (meaningRaw) {
            const enMatch = meaningRaw.match(/<<English:?>>([\s\S]*?)(?=<<\*\*Hindi:\*\*>>|<<Hindi:?>>|$)/i);
            const hiMatch = meaningRaw.match(/(?:<<\*\*Hindi:\*\*>>|<<Hindi:?>>)([\s\S]*?)(?=<<English:?>>|$)/i);
            if (enMatch) meaningEn = cleanText(enMatch[1]);
            if (hiMatch) meaningHi = cleanText(hiMatch[1]);
          }

          const mnemonicRaw = getSection('MNEMONIC', ['USAGE', 'STORY', 'MEANING']);
          let mnemonicText = '';
          if (mnemonicRaw) {
            const textMatch = mnemonicRaw.match(/<<Text>>([\s\S]*)/i);
            mnemonicText = textMatch ? cleanText(textMatch[1]) : cleanText(mnemonicRaw.replace(/<<Text>>/i, ''));
          }

          const usageRaw = getSection('USAGE', ['STORY', 'MEANING', 'MNEMONIC']);
          const usages = [];
          if (usageRaw) {
            const parts = usageRaw.split(/<<\d+>>\.?/);
            parts.forEach(part => {
              if (!part.trim()) return;
              let context = '', en = '', hi = '';
              const enIndex = part.indexOf('EN:');
              const hiIndex = part.indexOf('HI:');
              
              if (enIndex !== -1) {
                context = part.substring(0, enIndex).trim();
                if (hiIndex !== -1) {
                  en = part.substring(enIndex + 3, hiIndex).trim();
                  hi = part.substring(hiIndex + 3).trim();
                } else {
                  en = part.substring(enIndex + 3).trim();
                }
              } else {
                context = part.trim();
              }
              
              context = context.replace(/^[.\s\-]+|[.\s\-]+$/g, ''); 
              if (en || hi || context) usages.push({ context, en, hi });
            });
          }

          return { story, meaningEn, meaningHi, mnemonicText, usages };
        };

        // --- MAIN COMPONENT ---
        function App() {
          const [word, setWord] = useState('');
          const [date, setDate] = useState('');
          const [rawText, setRawText] = useState('');
          const [mnemonicImage, setMnemonicImage] = useState(null);
          const [parsedData, setParsedData] = useState({ story: '', meaningEn: '', meaningHi: '', mnemonicText: '', usages: [] });
          const [isGenerating, setIsGenerating] = useState(false);
          
          const [showPromptModal, setShowPromptModal] = useState(false);
          const [isCopied, setIsCopied] = useState(false);

          useEffect(() => {
            const today = new Date();
            const formattedDate = `${today.getDate().toString().padStart(2, '0')}-${(today.getMonth() + 1).toString().padStart(2, '0')}-${today.getFullYear()}`;
            setDate(formattedDate);
          }, []);

          useEffect(() => {
            setParsedData(parseRawContent(rawText));
          }, [rawText]);

          const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => setMnemonicImage(reader.result);
              reader.readAsDataURL(file);
            }
          };

          const generatePDF = () => {
            if (!window.html2pdf) {
              alert("PDF Script failed to load. Please check your internet connection.");
              return;
            }
            if (!word) {
              alert("Please enter a target word.");
              return;
            }
            setIsGenerating(true);
            const element = document.getElementById('pdf-content');
            const safeWord = word.trim().toUpperCase();
            
            const opt = {
              margin: 0,
              filename: `VocabPod_${safeWord}.pdf`,
              image: { type: 'jpeg', quality: 1 },
              html2canvas: { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#0B1324' },
              jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
              pagebreak: { mode: ['css', 'legacy'] } 
            };

            window.html2pdf().set(opt).from(element).save().then(() => setIsGenerating(false));
          };

          const copyPromptToClipboard = async () => {
            try {
              await navigator.clipboard.writeText(AI_PROMPT);
              setIsCopied(true);
              setTimeout(() => setIsCopied(false), 2000);
            } catch (err) {
              console.error('Copy failed', err);
            }
          };

          return (
            <div className="h-[100dvh] w-full bg-[#0B1324] text-white font-inter selection:bg-[#3B82F6]/30 overflow-hidden flex flex-col relative">

              {/* PROMPT MODAL OVERLAY */}
              {showPromptModal && (
                <div className="absolute inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 lg:p-10">
                  <div className="bg-[#0F172A] border border-[#334155] rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
                    <div className="px-5 py-4 border-b border-[#1F2937] flex justify-between items-center bg-[#151E32]">
                      <div className="flex items-center gap-2">
                        <FileText className="text-[#60A5FA]" size={20} />
                        <h2 className="text-lg font-bold text-white tracking-wide">AI Master Prompt</h2>
                      </div>
                      <button 
                        onClick={() => setShowPromptModal(false)}
                        className="p-1.5 hover:bg-[#1E293B] rounded-lg transition-colors text-gray-400 hover:text-white"
                      >
                        <X size={20} />
                      </button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-5 bg-[#0B1324] custom-scrollbar">
                      <div className="bg-[#1E293B]/50 border border-[#334155] rounded-lg p-4">
                        <pre className="text-xs lg:text-sm text-[#D1D5DB] font-mono whitespace-pre-wrap leading-relaxed">
                          {AI_PROMPT}
                        </pre>
                      </div>
                    </div>

                    <div className="px-5 py-4 border-t border-[#1F2937] bg-[#151E32] flex justify-between items-center">
                      <span className="text-xs text-[#9CA3AF]">Paste this into ChatGPT, Claude, etc.</span>
                      <button 
                        onClick={copyPromptToClipboard}
                        className="flex items-center gap-2 px-6 py-2.5 bg-[#2563EB] hover:bg-[#1D4ED8] rounded-lg text-sm font-semibold transition-all"
                      >
                        {isCopied ? <Check size={16} /> : <Copy size={16} />}
                        {isCopied ? 'Copied to Clipboard!' : 'Copy Prompt'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* APP HEADER */}
              <header className="px-5 py-3 border-b border-[#1F2937] bg-[#0F172A] flex items-center justify-between shrink-0 z-20 shadow-md">
                <div className="flex items-center gap-3.5">
                  <a href="/" className="p-2 hover:bg-[#1E293B] rounded-lg transition-colors mr-1 cursor-pointer" title="Back to Home">
                    <ArrowLeft size={20} className="text-slate-400 hover:text-blue-400 transition-colors" />
                  </a>
                  <div className="bg-[#2563EB] p-2 rounded-lg shadow-sm">
                    <BookOpen size={22} className="text-white" />
                  </div>
                  <div className="flex flex-col relative">
                    <h1 className="text-[1.1rem] font-bold text-white leading-tight tracking-wide font-inter flex items-center gap-2">
                      FB Internal Tools
                      <button 
                        onClick={() => setShowPromptModal(true)}
                        className="text-[#60A5FA] hover:text-blue-300 hover:bg-[#1E293B] p-1 rounded-full transition-colors group relative"
                        title="View AI Prompt"
                      >
                        <Info size={16} />
                        <span className="absolute left-full ml-2 top-1/2 -translate-y-1/2 bg-[#1E293B] text-xs text-white px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap border border-[#334155]">
                          Get AI Prompt
                        </span>
                      </button>
                    </h1>
                    <p className="text-[#60A5FA] text-[10px] font-bold tracking-[0.15em] uppercase font-inter">VocabPod Creator</p>
                  </div>
                </div>
                
                <button 
                  onClick={generatePDF}
                  disabled={isGenerating || !word}
                  className="flex items-center gap-2 px-5 py-2.5 bg-[#2563EB] hover:bg-[#1D4ED8] rounded-lg text-sm font-semibold transition-all disabled:opacity-50 font-inter"
                >
                  {isGenerating ? <Loader2 className="animate-spin" size={18} /> : <Download size={18} />}
                  <span className="hidden sm:inline">{isGenerating ? 'Generating...' : 'Generate PDF'}</span>
                </button>
              </header>

              {/* MAIN CONTENT AREA */}
              <main className="flex-1 min-h-0 flex flex-col lg:flex-row w-full max-w-[1920px] mx-auto overflow-hidden">
                
                {/* LEFT PANEL: INPUT FORM */}
                <div className="w-full lg:w-[40%] xl:w-[35%] h-[40%] lg:h-full overflow-y-auto border-r border-[#1F2937] bg-[#0F172A] p-4 lg:p-6 custom-scrollbar shrink-0">
                  <div className="space-y-6 max-w-lg mx-auto lg:mx-0">
                    
                    <div>
                      <h2 className="text-[11px] text-[#9CA3AF] uppercase tracking-widest font-bold mb-3 font-inter">1. Target Details</h2>
                      <div className="flex gap-3">
                        <div className="flex-1">
                          <input 
                            type="text" value={word} onChange={e => setWord(e.target.value)}
                            placeholder="Word (e.g. INSIST)"
                            className="w-full bg-[#1E293B] border border-[#334155] text-white placeholder-[#64748B] focus:border-[#3B82F6] rounded-md p-2.5 outline-none transition-all uppercase font-bold text-sm font-inter"
                          />
                        </div>
                        <div className="flex-1">
                          <input 
                            type="text" value={date} onChange={e => setDate(e.target.value)}
                            placeholder="Date"
                            className="w-full bg-[#1E293B] border border-[#334155] text-white focus:border-[#3B82F6] rounded-md p-2.5 outline-none transition-all text-sm font-inter"
                          />
                        </div>
                      </div>
                    </div>

                    <div className="flex flex-col h-64 lg:h-[350px]">
                      <div className="flex justify-between items-center mb-3">
                         <h2 className="text-[11px] text-[#9CA3AF] uppercase tracking-widest font-bold font-inter">2. Document Source</h2>
                         <button onClick={() => setRawText('')} className="text-[11px] text-[#EF4444] hover:text-[#F87171] transition-colors font-inter">Clear</button>
                      </div>
                      <textarea 
                        value={rawText} 
                        onChange={e => setRawText(e.target.value)}
                        placeholder="Paste your <STORY>, <MEANING>, <MNEMONIC>, <USAGE> blocks here..."
                        className="w-full flex-1 bg-[#1E293B] border border-[#334155] text-[#CBD5E1] placeholder-[#475569] focus:border-[#3B82F6] rounded-md p-3 outline-none transition-all resize-none font-mono text-[13px] leading-relaxed custom-scrollbar shadow-inner"
                      />
                    </div>

                    <div>
                      <div className="flex items-center justify-between mb-3">
                        <h2 className="text-[11px] text-[#9CA3AF] uppercase tracking-widest font-bold font-inter">3. Mnemonic Asset</h2>
                        {mnemonicImage && (
                          <button onClick={() => setMnemonicImage(null)} className="text-[11px] text-[#EF4444] flex items-center gap-1 font-inter">
                            <Trash2 size={12}/> Remove
                          </button>
                        )}
                      </div>
                      
                      {!mnemonicImage ? (
                        <label className="flex flex-col items-center justify-center w-full py-6 border border-dashed border-[#475569] hover:border-[#3B82F6] hover:bg-[#3B82F6]/5 rounded-xl cursor-pointer transition-all">
                          <div className="bg-[#1E293B] p-2 rounded-full mb-2">
                            <CloudUpload size={20} className="text-[#60A5FA]" />
                          </div>
                          <span className="text-sm text-white font-medium font-inter">Upload Image File</span>
                          <span className="text-[11px] text-[#64748B] mt-1 font-inter">Drag & drop your mnemonic image</span>
                          <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} onClick={(e) => (e.target.value = null)} />
                        </label>
                      ) : (
                        <div className="bg-[#1E293B] rounded-xl border border-[#334155] p-2 h-32 flex items-center justify-center relative overflow-hidden">
                          <img src={mnemonicImage} alt="Mnemonic" className="h-full object-contain rounded-lg" />
                        </div>
                      )}
                    </div>

                  </div>
                </div>

                {/* RIGHT PANEL: LIVE PDF PREVIEW */}
                <div className="flex-1 h-[60%] lg:h-full flex flex-col bg-[#0B1324] relative">
                    
                  <div className="px-5 py-2.5 border-b border-[#1F2937] flex justify-between items-center bg-[#0F172A] shrink-0 shadow-sm z-10">
                    <span className="text-[11px] font-bold text-[#9CA3AF] uppercase tracking-widest font-inter">Live Document Preview</span>
                    <span className="text-[10px] text-[#64748B] bg-[#1E293B] px-2 py-1 rounded font-inter">A4 Format</span>
                  </div>

                  <div className="flex-1 overflow-auto p-4 md:p-8 custom-scrollbar relative bg-[#05080F]">
                    <div className="w-max mx-auto h-max shadow-2xl">
                      
                      <div id="pdf-content" className="w-[794px] min-h-[1123px] bg-[#0B1324] p-12 text-white relative shrink-0" style={{ boxSizing: "border-box" }}>
                        
                        {/* 1. HEADER */}
                        <div className="flex justify-between items-end mb-8 avoid-break border-b border-[#334155] pb-8">
                          <div className="flex flex-col">
                            <span className="font-inter text-[34px] font-bold text-[#E2E8F0] uppercase tracking-[0.12em] leading-none mb-1">
                              FLUENCY
                            </span>
                            <span className="font-playfair text-[54px] italic font-semibold text-white leading-none -mt-3">
                              bridge
                            </span>
                            <span className="text-[#60A5FA] text-[1.05rem] font-medium mt-3 font-inter tracking-wide">
                              The fun way to learn vocab
                            </span>
                          </div>
                          <div className="pb-2">
                            <span className="text-[11px] text-[#9CA3AF] font-bold tracking-widest uppercase bg-[#151E32] px-3.5 py-2 rounded-lg font-inter border border-[#2A344A]">
                              {date || 'DD-MM-YYYY'}
                            </span>
                          </div>
                        </div>

                        {/* 2. TARGET WORD */}
                        <div className="mb-8 avoid-break">
                          <div className="inline-block relative">
                            <div className="absolute -inset-2 bg-blue-500/20 blur-xl rounded-full opacity-50"></div>
                            <h1 className="relative text-[3.25rem] font-black tracking-tight text-white uppercase font-inter leading-none drop-shadow-[0_2px_12px_rgba(255,255,255,0.15)]">
                              {word || 'UNTITLED'}
                            </h1>
                          </div>
                        </div>

                        <div className="space-y-6">
                          
                          {/* STORY Section */}
                          {parsedData.story && (
                            <div className="bg-[#151E32] border border-[#2A344A] rounded-xl p-6 relative">
                               <div className="flex items-center gap-2 mb-3 border-b border-[#2A344A] pb-2">
                                 <FileText size={16} className="text-[#60A5FA]" />
                                 <span className="text-xs font-bold text-[#9CA3AF] uppercase tracking-widest font-inter">Contextual Story</span>
                               </div>
                              <div className="text-[1.05rem] font-inter">
                                {parseMarkdown(parsedData.story)}
                              </div>
                            </div>
                          )}

                          {/* MEANING Section */}
                          {(parsedData.meaningHi || parsedData.meaningEn) && (
                            <div className="flex gap-5 pdf-avoid-break">
                              {parsedData.meaningHi && (
                                <div className="flex-1 bg-[#151E32] border border-[#2A344A] rounded-xl p-5 border-l-4 border-l-[#3B82F6] shadow-sm">
                                  <h3 className="text-[10px] uppercase tracking-widest text-[#9CA3AF] font-bold mb-2 font-inter">Hindi Meaning</h3>
                                  <p className="text-lg font-medium text-white font-inter">{parsedData.meaningHi}</p>
                                </div>
                              )}
                              {parsedData.meaningEn && (
                                <div className="flex-1 bg-[#151E32] border border-[#2A344A] rounded-xl p-5 border-l-4 border-l-[#8B5CF6] shadow-sm">
                                  <h3 className="text-[10px] uppercase tracking-widest text-[#9CA3AF] font-bold mb-2 font-inter">English Meaning</h3>
                                  <p className="text-lg font-medium text-white font-inter">{parsedData.meaningEn}</p>
                                </div>
                              )}
                            </div>
                          )}

                          {/* MNEMONIC Section */}
                          {(mnemonicImage || parsedData.mnemonicText) && (
                            <div className="bg-[#151E32] border border-[#2A344A] rounded-xl p-6 pdf-avoid-break relative">
                              <div className="flex items-center gap-2 mb-4 border-b border-[#2A344A] pb-2">
                                 <ImageIcon size={16} className="text-[#60A5FA]" />
                                 <span className="text-xs font-bold text-[#9CA3AF] uppercase tracking-widest font-inter">Mnemonic Logic</span>
                              </div>
                              <div className="flex flex-col gap-5 items-center">
                                {mnemonicImage && (
                                  <img src={mnemonicImage} alt="Mnemonic" className="max-w-[450px] max-h-[250px] rounded-lg shadow-md border border-[#334155] object-contain bg-[#0F172A] p-1.5" />
                                )}
                                {parsedData.mnemonicText && (
                                  <div className="text-center text-[#E2E8F0] font-medium text-[1.1rem] bg-[#0F172A] border border-[#2A344A] px-6 py-4 rounded-lg w-full font-inter">
                                    {parseMarkdown(parsedData.mnemonicText)}
                                  </div>
                                )}
                              </div>
                            </div>
                          )}

                          {/* USAGE Section */}
                          {parsedData.usages.length > 0 && (
                            <div className="bg-[#151E32] border border-[#2A344A] rounded-xl p-6 relative">
                               <div className="flex items-center gap-2 mb-4 border-b border-[#2A344A] pb-2 pdf-avoid-break">
                                 <Type size={16} className="text-[#60A5FA]" />
                                 <span className="text-xs font-bold text-[#9CA3AF] uppercase tracking-widest font-inter">Real-World Usage</span>
                               </div>
                              <div className="grid grid-cols-1 gap-4">
                                {parsedData.usages.map((u, i) => (
                                  <div key={i} className="bg-[#0F172A] border border-[#2A344A] rounded-lg p-4 flex gap-4 items-start pdf-avoid-break shadow-sm">
                                    <span className="flex-shrink-0 w-7 h-7 bg-[#1E3A8A] text-[#60A5FA] rounded-md flex items-center justify-center font-bold text-sm border border-[#2563EB]/30 shadow-sm font-inter">
                                      {i + 1}
                                    </span>
                                    <div className="flex-1">
                                      {u.context && <h4 className="text-[11px] font-bold text-[#94A3B8] uppercase tracking-widest mb-1.5 font-inter">{u.context}</h4>}
                                      <div className="space-y-1">
                                        {u.en && <div className="text-white font-medium text-[1rem] font-inter">{parseMarkdown(u.en)}</div>}
                                        {u.hi && <div className="text-[#9CA3AF] text-[0.95rem] font-inter">{parseMarkdown(u.hi)}</div>}
                                      </div>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}
                          
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
