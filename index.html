<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Fluency Bridge</title>  
  
    <!-- Tailwind -->  
    <script src="https://cdn.tailwindcss.com"></script>  
  
    <!-- Serif font -->  
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">  
    
    <!-- PWA Configuration -->
    <script src="/pwa-setup.js"></script>

    <style>
        /* Floating button tap animation */
        .fab:active {
            transform: scale(0.9);
        }
    </style>
</head>  
  
<body class="bg-gradient-to-b from-slate-900 via-blue-950 to-slate-950 text-white min-h-screen font-sans p-6">  
  
    <div class="max-w-4xl mx-auto mt-12">  
  
        <!-- HERO -->  
        <header class="text-center mb-10">  
            <h1 class="text-4xl md:text-5xl tracking-wide">  
                <span class="block text-white/90 font-semibold tracking-widest">  
                    FLUENCY  
                </span>  
                <span class="block text-white mt-2 text-5xl md:text-6xl"  
                      style="font-family: 'Playfair Display', serif; font-style: italic;">  
                    bridge  
                </span>  
            </h1>  
  
            <p class="text-sm text-blue-300 mt-4">  
                Build precision. Eliminate confusion.  
            </p>  
        </header>  
  
        <!-- CONTROLS -->  
        <div class="mb-6 flex flex-col md:flex-row gap-4">  
  
            <!-- SEARCH -->  
            <input id="search" type="text" placeholder="Search..."  
                class="flex-1 p-2 rounded bg-slate-800 border border-slate-600">  
  
            <!-- SORT -->  
            <select id="sort" class="p-2 rounded bg-slate-800 border border-slate-600">  
                <option value="default">Sort: Default</option>  
                <option value="az">A → Z</option>  
                <option value="za">Z → A</option>  
            </select>  
  
        </div>  
  
        <!-- CONTENT -->  
        <div id="tools"></div>  
  
    </div>  
  
    <!-- FLOATING CONTACT BUTTON -->
    <a href="/contactus.html"
       class="fab fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full 
              bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-500/30 
              flex items-center justify-center text-2xl transition-all">
        📞
    </a>
  
    <!-- SCRIPT -->  
    <script>  
        const EXTENSION = ".html";  
  
        const container = document.getElementById("tools");  
        const searchInput = document.getElementById("search");  
        const sortSelect = document.getElementById("sort");  
  
        let originalData = [];  
  
        function render(data) {  
            container.innerHTML = "";  
  
            const grouped = {};  
  
            data.forEach(item => {  
                const category = item.category || "Other";  
                if (!grouped[category]) grouped[category] = [];  
                grouped[category].push(item);  
            });  
  
            Object.keys(grouped).forEach(category => {  
  
                const section = document.createElement("div");  
                section.className = "mb-12";  
  
                const heading = document.createElement("button");  
                heading.className = "w-full text-left text-xl font-bold text-blue-300 mb-4 uppercase tracking-wide flex justify-between items-center";  
  
                heading.innerHTML = `  
                    <span>${category}</span>  
                    <span class="text-sm">▼</span>  
                `;  
  
                const grid = document.createElement("div");  
                grid.className = "grid grid-cols-1 md:grid-cols-2 gap-6";  
  
                heading.addEventListener("click", () => {  
                    grid.classList.toggle("hidden");  
                });  
  
                grouped[category].forEach(item => {  
  
                    const url = (item.folder ? item.folder + "/" : "") + item.slug + EXTENSION;  
  
                    const card = document.createElement("a");  
                    card.href = url;  
                    card.className = `  
                        block p-6 bg-slate-800/60 backdrop-blur border border-slate-700 rounded-xl   
                        hover:border-blue-500 hover:shadow-lg hover:shadow-blue-500/20 transition-all group  
                    `;  
  
                    card.innerHTML = `  
                        <h2 class="text-lg font-semibold text-blue-400 mb-2 group-hover:text-blue-300">  
                            ${item.title}  
                        </h2>  
                        <p class="text-sm text-slate-300">Open →</p>  
                    `;  
  
                    grid.appendChild(card);  
                });  
  
                section.appendChild(heading);  
                section.appendChild(grid);  
                container.appendChild(section);  
            });  
        }  
  
        function applyFilters() {  
            let filtered = [...originalData];  
  
            const query = searchInput.value.toLowerCase();  
            if (query) {  
                filtered = filtered.filter(item =>  
                    item.title.toLowerCase().includes(query)  
                );  
            }  
  
            if (sortSelect.value === "az") {  
                filtered.sort((a, b) => a.title.localeCompare(b.title));  
            } else if (sortSelect.value === "za") {  
                filtered.sort((a, b) => b.title.localeCompare(a.title));  
            }  
  
            render(filtered);  
        }  
  
        searchInput.addEventListener("input", applyFilters);  
        sortSelect.addEventListener("change", applyFilters);  
  
        fetch('./index.json')  
            .then(res => res.json())  
            .then(data => {  
                originalData = data;  
                render(originalData);  
            })  
            .catch(err => {  
                console.error("Error loading JSON:", err);  
            });  
            
    </script>  
  
</body>  
</html>
