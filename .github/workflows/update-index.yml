name: Auto-Generate Index JSON

on:
  push:
    branches:
      - main
    paths:
      - '**/*.html' # Only run when an HTML file changes

jobs:
  generate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed so the action can push the updated JSON back

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build New index.json
        run: node generate-index.js

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update index.json based on new HTML files [skip ci]"
          file_pattern: 'index.json'
